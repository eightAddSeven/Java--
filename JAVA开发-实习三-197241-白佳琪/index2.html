<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>高级文本差异对比 (字符级高亮)</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); padding: 25px; }
        textarea { font-family: 'Consolas', monospace; font-size: 13px; margin-bottom: 15px; }
        .diff-panel { 
            height: 450px; overflow-y: auto; border: 1px solid #dee2e6; 
            background: #fff; font-family: 'Consolas', monospace; white-space: pre; padding: 10px;
        }
        /* 行样式 */
        .line { display: block; padding: 0 5px; min-height: 1.5em; }
        .added-line { background-color: #e6ffec; }
        .deleted-line { background-color: #ffebe9; }
        /* 字符高亮样式 */
        ins { background-color: #acf2bd; text-decoration: none; font-weight: bold; } /* 新增字符 */
        del { background-color: #ffb1ac; text-decoration: none; font-weight: bold; } /* 删除字符 */
        .empty-line { background-color: #fafafa; color: #ccc; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="main-card">
        <h4 class="mb-4">精准字符级对比工具</h4>
        
        <div class="row mb-3">
            <div class="col-6">
                <input type="file" class="form-control mb-2" onchange="loadFile(1, 'text1')">
                <textarea class="form-control" id="text1" rows="5" placeholder="输入原文本..." oninput="compare()"></textarea>
            </div>
            <div class="col-6">
                <input type="file" class="form-control mb-2" onchange="loadFile(2, 'text2')">
                <textarea class="form-control" id="text2" rows="5" placeholder="输入新文本..." oninput="compare()"></textarea>
            </div>
        </div>

        <div class="row">
            <div class="col-6"><div id="view1" class="diff-panel"></div></div>
            <div class="col-6"><div id="view2" class="diff-panel"></div></div>
        </div>
    </div>
</div>

<script>
    // 字符级 LCS 函数：返回带 HTML 标记的差异字符串
    function getCharDiff(str1, str2) {
        let m = str1.length, n = str2.length;
        let dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
        for(let i=1; i<=m; i++) {
            for(let j=1; j<=n; j++) {
                if(str1[i-1] === str2[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
                else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
            }
        }
        let res1 = "", res2 = "", i = m, j = n;
        while(i > 0 || j > 0) {
            if(i > 0 && j > 0 && str1[i-1] === str2[j-1]) {
                res1 = str1[i-1] + res1; res2 = str2[j-1] + res2;
                i--; j--;
            } else if(j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
                res2 = "<ins>" + str2[j-1] + "</ins>" + res2;
                j--;
            } else {
                res1 = "<del>" + str1[i-1] + "</del>" + res1;
                i--;
            }
        }
        return [res1, res2];
    }

    async function loadFile(num, id) {
        const file = event.target.files[0];
        document.getElementById(id).value = await file.text();
        compare();
    }

    function compare() {
        const lines1 = document.getElementById('text1').value.split(/\r?\n/);
        const lines2 = document.getElementById('text2').value.split(/\r?\n/);
        const m = lines1.length, n = lines2.length;
        const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));

        for(let i=1; i<=m; i++) {
            for(let j=1; j<=n; j++) {
                if(lines1[i-1] === lines2[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
                else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
            }
        }

        let i = m, j = n, h1 = [], h2 = [];
        while(i > 0 || j > 0) {
            if(i > 0 && j > 0 && lines1[i-1] === lines2[j-1]) {
                const txt = lines1[i-1];
                h1.push(`<span class="line">  ${txt}</span>`);
                h2.push(`<span class="line">  ${txt}</span>`);
                i--; j--;
            } else if(j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
                // 如果左侧还有对应的待处理行，我们尝试做字符级对比（模拟修改）
                if(i > 0 && dp[i-1][j] === dp[i][j-1]) {
                    const [d1, d2] = getCharDiff(lines1[i-1], lines2[j-1]);
                    h1.push(`<span class="line deleted-line">- ${d1}</span>`);
                    h2.push(`<span class="line added-line">+ ${d2}</span>`);
                    i--; j--;
                } else {
                    h1.push(`<span class="line empty-line"> </span>`);
                    h2.push(`<span class="line added-line">+ ${lines2[j-1]}</span>`);
                    j--;
                }
            } else {
                h1.push(`<span class="line deleted-line">- ${lines1[i-1]}</span>`);
                h2.push(`<span class="line empty-line"> </span>`);
                i--;
            }
        }
        document.getElementById('view1').innerHTML = h1.reverse().join('');
        document.getElementById('view2').innerHTML = h2.reverse().join('');
    }
</script>
</body>
</html>
