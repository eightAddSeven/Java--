<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CUG 在线评测系统 (OJ)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .editor-textarea {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            background-color: #272822;
            color: #f8f8f2;
            border-radius: 8px;
        }
        .editor-textarea:focus {
            background-color: #272822;
            color: #f8f8f2;
            box-shadow: 0 0 0 0.25rem rgba(33, 37, 41, 0.25);
        }
        .result-card {
            background-color: #e9ecef;
            border-left: 5px solid #0d6efd;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🚀 CUG Online Judge (单机沙箱版)</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0 mt-1">代码编辑器</h5>
                </div>
                <div class="card-body">
                    <form action="/submit" method="post">
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-end mb-2">
                                <label for="code" class="form-label text-muted mb-0">请在此输入你的代码：</label>
                                <select class="form-select form-select-sm" name="language" style="width: auto;" th:value="${language}">
                                    <option value="java" th:selected="${language == 'java'}">Java 17</option>
                                    <option value="cpp" th:selected="${language == 'cpp'}">C++ 14 (g++)</option>
                                </select>
                            </div>
    
                            <textarea class="form-control editor-textarea" id="code" name="code" rows="15" 
                                    placeholder="#include <iostream>&#10;using namespace std;&#10;&#10;int main() {&#10;    return 0;&#10;}" 
                                    th:text="${code}"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="input" class="form-label text-muted">标准输入 (Test Input)：</label>
                            <textarea class="form-control" id="input" name="input" rows="3" 
          placeholder="例如：1 2" style="font-family: monospace;" 
          th:text="${input}"></textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-primary px-4">
                                提交并运行
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm result-card" th:if="${result != null}">
                <div class="card-body">
                    <h5 class="card-title text-primary">判题结果</h5>
                    <hr>
                    <pre class="mb-0" style="white-space: pre-wrap; word-wrap: break-word;" th:text="${result}"></pre>
                </div>
            </div>
            
        </div>
    </div>
</div>

</body>
</html>
